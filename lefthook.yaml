commit-msg:
  commands:
    lint-commit-message:
      run: npx commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    ts:check:
      run: npm run ts:check
      stage_fixed: true
    biome:check:
      run: npm run biome:check
      stage_fixed: true
    file:size:check:
      run: sh scripts/hooks/file-size-check.sh
    branch:protect:
      run: sh scripts/hooks/branch-protect.sh
      skip:
        - merge
    secrets:check:
      run: command -v gitleaks >/dev/null 2>&1 && gitleaks git --staged --verbose || echo "gitleaks not installed, skipping secrets scan"

pre-push:
  commands:
    build:
      run: npm run build

post-checkout:
  commands:
    install-deps:
      run: npm ci
      glob: "package-lock.json"

post-merge:
  commands:
    install-deps:
      run: npm ci
      glob: "package-lock.json"