commit-msg:
  commands:
    lint-commit-message:
      run: pnpm exec commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    ts:check:
      run: pnpm ts:check
      stage_fixed: true
    biome:check:
      run: pnpm biome:check
      stage_fixed: true
    file:size:check:
      run: sh scripts/hooks/file-size-check.sh
    branch:protect:
      run: sh scripts/hooks/branch-protect.sh
      skip:
        - merge
    secrets:check:
      run: command -v gitleaks >/dev/null 2>&1 && gitleaks git --staged --verbose || echo "gitleaks not installed, skipping secrets scan"

pre-push:
  commands:
    build:
      run: pnpm build

post-checkout:
  commands:
    install-deps:
      run: pnpm install
      glob: "pnpm-lock.yaml"

post-merge:
  commands:
    install-deps:
      run: pnpm install
      glob: "pnpm-lock.yaml"